<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">

<title>Не курю</title>
<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg:#0b0f1a;
  --card:#121826;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --accent2:#38bdf8;
  --danger:#ef4444;
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
  background:linear-gradient(180deg,#0b0f1a,#0f172a);
  color:var(--text);
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:26px;
  font-weight:600;
}

.badge{
  background:rgba(34,197,94,0.15);
  color:var(--accent);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.label{
  color:var(--muted);
  font-size:13px;
}

.value{
  font-size:28px;
  margin-top:6px;
  font-weight:600;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.progress{
  height:10px;
  background:#1e293b;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.progress div{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:0.4s;
}

.goal{
  font-size:14px;
  margin-top:6px;
}

input,button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:15px;
}

input{
  background:#0f172a;
  color:#fff;
}

button{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#000;
  font-weight:600;
}

.footer{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}.startDisplay{
  margin-top:6px;
  padding:10px;
  border-radius:12px;
  background:#0f172a;
  color:#94a3b8;
  font-size:14px;
  border:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🚭 Не курю</div>
  <div class="badge">PRO</div>
</div>

<div class="card">
  <div class="label">Сколько не курю</div>
  <div class="value" id="time"></div>
</div>

<div class="grid">
  <div class="card">
    <div class="label">Сэкономлено</div>
    <div class="value" id="money"></div>
  </div>

  <div class="card">
    <div class="label">Сигарет не выкурено</div>
    <div class="value" id="cigs"></div>
  </div>
</div>

<div class="card">
  <div class="label">Восстановление организма</div>
  <div class="value" id="healthText"></div>
  <div class="progress"><div id="healthBar"></div></div>
</div>

<div class="card">
  <div class="label">Цели</div>
  <div id="goals"></div>
</div>

<div class="card">
  <div class="label">Настройки</div>
  <<div class="label">Дата начала (когда бросил)</div>
<div class="label">Дата начала</div>
<div class="startDisplay" id="startDisplay"></div>
<input type="datetime-local" id="dateInput"><input type="datetime-local" id="dateInput" placeholder="Выбери дату и время">
  <input type="number" id="priceInput" placeholder="Цена пачки (грн)">
  <input type="number" id="cigsInput" placeholder="Сигарет в день">
  <button onclick="save()">Сохранить</button>
</div>

<div class="footer">Держись. Ты уже сделал главное.</div>

<script>
const CIGS_PER_PACK = 20;

let start = localStorage.getItem("start");
let price = parseFloat(localStorage.getItem("price")) || 165;
let cigsPerDay = parseFloat(localStorage.getItem("cigs")) || 20;
       
        if (!start){
  if (!localStorage.getItem("start_manual")){
  document.getElementById("dateInput").classList.add("highlight");
}
          if (!start){
  startDisplay.innerText = "Не задано";
} else {
  start = new Date(start);
}
if (!localStorage.getItem("start")){
  document.getElementById("dateInput").classList.add("highlight");
}
start = new Date(start);

function save(){
  const d = dateInput.value;
  const p = priceInput.value;
  const c = cigsInput.value;

  if(d){
    localStorage.setItem("start", d);
    localStorage.setItem("start_manual", "1");
  }
  if(p) localStorage.setItem("price", p);
  if(c) localStorage.setItem("cigs", c);

  location.reload();
}

function update(){
  const now = new Date();
  const sec = Math.floor((now - start)/1000);

  const d = Math.floor(sec/86400);
  const h = Math.floor(sec/3600)%24;
  const m = Math.floor(sec/60)%60;

  

  const saved = (sec * cigsPerDay * price / (CIGS_PER_PACK * 86400)).toFixed(2);
  money.innerText = saved + " грн";

  const cigs = Math.floor((sec/86400)*cigsPerDay);
  cigsEl = document.getElementById("cigs");
  cigsEl.innerText = cigs;

  const health = Math.min(100, sec/(86400*30)*100);
  healthBar.style.width = health+"%";
  healthText.innerText = Math.floor(health)+"%";

  const goalsArr=[1,7,30,90];
  goals.innerHTML = goalsArr.map(g=>{
    return (d>=g?"✅":"⬜")+" "+g+" дней";
  }).join("<br>");
}

setInterval(update,1000);
update()startDisplay.innerText = formatDate(start);const startDisplay = document.getElementById("startDisplay");

function formatDate(d){
  return d.toLocaleString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

startDisplay.innerText = formatDate(start);;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
